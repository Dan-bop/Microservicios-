server:
  port: 8084

spring:
  application:
    name: notificacion-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: true

empresa:
  nombre: Cable Ebenecer Trujillo
  email: ${MAIL_USER}
  datos-pago: "Yape/Plin: 987 298 465 | Oficina: Trujillo"

eureka:
  client:
    service-url:
      defaultZone: https://ebenecer-eureka.onrender.com/eureka/
  instance:
    prefer-ip-address: false