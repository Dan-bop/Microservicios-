services:
  postgres-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: soporte
    ports:
      - "5432:5432"
    networks:
      - ebenecer-net
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  postgres-cliente:
    image: postgres:15-alpine
    container_name: postgres-cliente
    environment:
      POSTGRES_DB: cliente_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: soporte
    ports:
      - "5433:5432"
    networks:
      - ebenecer-net
    volumes:
      - postgres-cliente-data:/var/lib/postgresql/data

  postgres-pago:
    image: postgres:15-alpine
    container_name: postgres-pago
    environment:
      POSTGRES_DB: pago_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: soporte
    ports:
      - "5434:5432"
    networks:
      - ebenecer-net
    volumes:
      - postgres-pago-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ebenecer-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./eurekaserver
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - ebenecer-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 10

  auth-service:
    build: ./auht-service
    container_name: auth-service
    env_file:
      - .env
    environment:
      DB_AUTH_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      DB_USER: postgres
      DB_PASSWORD: soporte
      JWT_SECRET: ZWJlbmVjZXJjYWJsZXRydWppbGxvc2VjcmV0a2V5MjAyNnNlY3VyZQ==
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres-auth:
        condition: service_started
    networks:
      - ebenecer-net

  cliente-service:
    build: ./cliente-service
    container_name: cliente-service
    environment:
      DB_CLIENTE_URL: jdbc:postgresql://postgres-cliente:5432/cliente_db
      DB_USER: postgres
      DB_PASSWORD: soporte
      EUREKA_URL: http://eureka-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres-cliente:
        condition: service_started
    networks:
      - ebenecer-net

  pago-service:
    build: ./pago-service
    container_name: pago-service
    environment:
      DB_PAGO_URL: jdbc:postgresql://postgres-pago:5432/pago_db
      DB_USER: postgres
      DB_PASSWORD: soporte
      EUREKA_URL: http://eureka-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres-pago:
        condition: service_started
    networks:
      - ebenecer-net

  notificacion-service:
    build: ./notificacion-service
    container_name: notificacion-service
    env_file:
      - .env # 👈 AÑADIDO: para cargar MAIL_USER y MAIL_PASSWORD
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
    depends_on:
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ebenecer-net

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ZWJlbmVjZXJjYWJsZXRydWppbGxvc2VjcmV0a2V5MjAyNnNlY3VyZQ==
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - ebenecer-net

networks:
  ebenecer-net:
    driver: bridge

volumes:
  postgres-auth-data:
  postgres-cliente-data:
  postgres-pago-data: