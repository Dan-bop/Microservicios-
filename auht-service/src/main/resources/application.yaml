server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_AUTH_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: auth_schema
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    hostname: ebenecer-auth.onrender.com
    prefer-ip-address: false
    non-secure-port: 80