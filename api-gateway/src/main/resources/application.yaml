server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: cliente-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/clientes/**

        - id: pago-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pagos/**

        - id: notificacion-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notificaciones/**

jwt:
  secret: ${JWT_SECRET}