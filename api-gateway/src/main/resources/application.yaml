server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Usamos el formato del Archivo 2 para CORS, es más robusto
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # Usamos el formato del Archivo 1 para las rutas (Eureka)
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        # ... (las demás rutas iguales al archivo 1)

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: https://ebenecer-eureka.onrender.com/eureka/
  instance:
    hostname: ebenecer-gateway.onrender.com
    prefer-ip-address: false